name: CI

# Roda a cada push e pull request: garante que o código passa no lint,
# no type-check (app + funções Netlify) e nos testes antes de virar deploy.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check (app + Netlify Functions)
        run: npx tsc -b

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
